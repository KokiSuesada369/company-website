<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面｜SAIZEN警備保障株式会社</title>
  <link rel="icon" href="/images/logo-01a.png" type="image/png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #1a2f5e;
      --navy2:  #2a4898;
      --gold:   #d97706;
      --gold2:  #b45309;
      --bg:     #f0f2f7;
      --white:  #ffffff;
      --border: #d1d5db;
      --text:   #111827;
      --muted:  #6b7280;
      --radius: 8px;
      --shadow: 0 2px 12px rgba(26,47,94,.12);
    }

    body {
      font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    /* ─── LOGIN ─── */
    #loginWrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      padding: 24px;
    }
    .login-card {
      background: var(--white);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
      text-align: center;
    }
    .login-logo { height: 48px; margin-bottom: 20px; object-fit: contain; }
    .login-title { font-size: 1.2rem; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
    .login-sub { font-size: .82rem; color: var(--muted); margin-bottom: 32px; }
    .login-card label {
      display: block; font-size: .82rem; font-weight: 600;
      color: var(--navy); text-align: left; margin-bottom: 6px;
    }
    .login-card input[type="password"] {
      width: 100%; padding: 11px 14px;
      border: 2px solid var(--border); border-radius: var(--radius);
      font-size: .95rem; outline: none; transition: border-color .15s; margin-bottom: 12px;
    }
    .login-card input[type="password"]:focus { border-color: var(--navy); }
    .login-err { font-size: .82rem; color: #dc2626; min-height: 20px; margin-bottom: 8px; text-align: left; }
    .btn-login {
      width: 100%; padding: 13px; background: var(--navy); color: #fff;
      border: none; border-radius: var(--radius); font-size: .95rem;
      font-weight: 700; cursor: pointer; transition: background .15s;
    }
    .btn-login:hover { background: var(--navy2); }

    /* ─── ADMIN LAYOUT ─── */
    #adminWrap { display: none; }

    .admin-header {
      background: var(--navy); color: #fff;
      padding: 0 28px; height: 60px;
      display: flex; align-items: center; gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      position: sticky; top: 0; z-index: 100;
    }
    .admin-logo { height: 34px; object-fit: contain; filter: brightness(10); }
    .admin-header-title { font-size: 1rem; font-weight: 700; letter-spacing: .04em; flex: 1; }
    .btn-logout {
      padding: 7px 18px; background: rgba(255,255,255,.12); color: #fff;
      border: 1px solid rgba(255,255,255,.25); border-radius: var(--radius);
      font-size: .82rem; cursor: pointer; transition: background .15s;
    }
    .btn-logout:hover { background: rgba(255,255,255,.22); }

    .admin-body { max-width: 1280px; margin: 28px auto; padding: 0 24px; }

    /* ─── TOOLBAR ─── */
    .toolbar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 18px; flex-wrap: wrap;
    }
    .btn-new-contract {
      padding: 10px 22px; background: var(--gold); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: .88rem; font-weight: 700; cursor: pointer;
      transition: background .15s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-new-contract:hover { background: var(--gold2); }
    .btn-refresh {
      padding: 10px 18px; background: var(--white); color: var(--navy);
      border: 2px solid var(--navy); border-radius: var(--radius);
      font-size: .88rem; font-weight: 700; cursor: pointer;
      transition: background .15s, color .15s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-refresh:hover { background: var(--navy); color: #fff; }

    .section-heading {
      font-size: 1.1rem; font-weight: 700; color: var(--navy);
      margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
    }
    .section-heading::after { content: ''; flex: 1; height: 2px; background: var(--border); }

    /* ─── STATUS MESSAGE ─── */
    .msg-loading, .msg-error {
      padding: 16px 20px; border-radius: var(--radius);
      font-size: .88rem; font-weight: 600; margin-bottom: 14px;
    }
    .msg-loading { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .msg-error   { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }

    /* ─── TABLE ─── */
    .table-wrap {
      background: var(--white); border-radius: 12px;
      box-shadow: var(--shadow); overflow-x: auto;
    }
    .orders-table { width: 100%; border-collapse: collapse; min-width: 700px; }
    .orders-table thead th {
      background: var(--navy); color: #fff;
      padding: 12px 14px; text-align: left;
      font-size: .82rem; font-weight: 700;
      white-space: nowrap; letter-spacing: .03em;
    }
    .orders-table tbody tr { border-bottom: 1px solid var(--border); transition: filter .1s; }
    .orders-table tbody tr:last-child { border-bottom: none; }
    .orders-table tbody tr:hover { filter: brightness(.97); }
    .orders-table td { padding: 10px 14px; vertical-align: middle; font-size: .87rem; }

    /* ステータスで行の背景色 */
    tr.st-未確認       { background: #ffffff; }
    tr.st-確認済       { background: #eff6ff; }
    tr.st-手配完了     { background: #f0fdf4; }
    tr.st-契約書作成済 { background: #f3f4f6; }

    /* インラインステータスドロップダウン */
    .status-select-sm {
      padding: 5px 8px; border: 2px solid var(--border);
      border-radius: 6px; font-size: .82rem; color: var(--navy);
      font-weight: 600; cursor: pointer; outline: none;
      background: #fff; max-width: 120px;
    }
    .status-select-sm:focus { border-color: var(--navy); }

    /* アクションセル */
    .action-cell { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .btn-detail {
      padding: 5px 12px; background: var(--navy); color: #fff;
      border: none; border-radius: 6px; font-size: .8rem;
      font-weight: 700; cursor: pointer; white-space: nowrap;
      transition: background .15s;
    }
    .btn-detail:hover { background: var(--navy2); }
    .btn-contract-sm {
      padding: 5px 12px; background: var(--gold); color: #fff;
      border: none; border-radius: 6px; font-size: .8rem;
      font-weight: 700; text-decoration: none; white-space: nowrap;
      display: inline-block; transition: background .15s; cursor: pointer;
    }
    .btn-contract-sm:hover { background: var(--gold2); }

    /* ─── DETAIL MODAL ─── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 200;
      align-items: flex-start; justify-content: center;
      padding: 32px 16px; overflow-y: auto;
    }
    .overlay.open { display: flex; }
    .detail-modal {
      background: var(--white); border-radius: 14px;
      width: 100%; max-width: 720px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      overflow: hidden; margin: auto;
    }
    .detail-head {
      background: var(--navy); color: #fff;
      padding: 18px 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .detail-head h2 { font-size: 1rem; font-weight: 700; }
    .btn-close {
      background: rgba(255,255,255,.15); color: #fff;
      border: none; border-radius: 6px;
      width: 32px; height: 32px; font-size: 1rem; cursor: pointer;
    }
    .btn-close:hover { background: rgba(255,255,255,.28); }
    .detail-body { padding: 24px; }
    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0; border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; margin-bottom: 20px;
    }
    .detail-label {
      background: #f3f5f9; padding: 9px 14px;
      font-size: .8rem; font-weight: 700; color: var(--navy);
      border-bottom: 1px solid var(--border);
    }
    .detail-val {
      padding: 9px 14px; font-size: .88rem;
      border-bottom: 1px solid var(--border);
      border-left: 1px solid var(--border); word-break: break-all;
    }
    .detail-label:last-of-type,
    .detail-val:last-of-type { border-bottom: none; }
    .detail-actions {
      display: flex; align-items: center; gap: 14px;
      flex-wrap: wrap; padding-top: 4px;
    }
    .btn-contract-lg {
      padding: 10px 24px; background: var(--gold); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: .9rem; font-weight: 700; text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
      cursor: pointer; transition: background .15s;
    }
    .btn-contract-lg:hover { background: var(--gold2); }

    @media (max-width: 680px) {
      .orders-table thead th:nth-child(4),
      .orders-table tbody td:nth-child(4) { display: none; }
      .detail-grid { grid-template-columns: 1fr; }
      .detail-val { border-left: none; }
    }
  </style>
</head>
<body>

<!-- ==================== LOGIN ==================== -->
<div id="loginWrap">
  <div class="login-card">
    <img src="/images/logo-08a.png" alt="SAIZEN警備保障" class="login-logo">
    <div class="login-title">管理画面ログイン</div>
    <div class="login-sub">SAIZEN警備保障株式会社 内部管理システム</div>
    <label for="pwInput">パスワード</label>
    <input type="password" id="pwInput" placeholder="パスワードを入力"
           onkeydown="if(event.key==='Enter') doLogin()">
    <div class="login-err" id="loginErr"></div>
    <button class="btn-login" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- ==================== ADMIN ==================== -->
<div id="adminWrap">
  <header class="admin-header">
    <img src="/images/logo-08a.png" alt="SAIZEN" class="admin-logo">
    <div class="admin-header-title">警備依頼 管理画面</div>
    <button class="btn-logout" onclick="doLogout()">ログアウト</button>
  </header>

  <div class="admin-body">
    <div class="toolbar">
      <button class="btn-new-contract" onclick="openNewContract()">📄 新規契約書を手動作成</button>
      <button class="btn-refresh" onclick="loadOrders()">🔄 更新</button>
    </div>

    <div class="section-heading">依頼一覧</div>

    <div class="msg-loading" id="msgLoading" style="display:none">データを取得中...</div>
    <div class="msg-error"   id="msgError"   style="display:none">
      データの取得に失敗しました。ネットワーク接続を確認して「更新」ボタンを押してください。
    </div>

    <div class="table-wrap">
      <table class="orders-table">
        <thead>
          <tr>
            <th>受付日時</th>
            <th>会社名</th>
            <th>現場名</th>
            <th>警備期間</th>
            <th>人数</th>
            <th>ステータス</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ==================== DETAIL MODAL ==================== -->
<div class="overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-modal" onclick="event.stopPropagation()">
    <div class="detail-head">
      <h2 id="detailTitle">依頼詳細</h2>
      <button class="btn-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<script>
  const GAS_URL  = 'https://script.google.com/macros/s/AKfycbxAIcflhTwYbWPOPjaGauiQPN8fr80h176098NaFGQFUpdEsQ6FM2Putccvdedue2Rz/exec';
  const PASS     = 'saizen2024';
  const AUTH_KEY = 'saizen_admin_auth';

  const STATUS_LIST = ['未確認', '確認済', '手配完了', '契約書作成済'];

  // GASから返るキー名（フォームのname属性）→ 内部キー名のマッピング
  const FIELD_MAP = {
    '受付日時':             'receivedAt',
    '会社名':               'company',
    '担当者名':             'contact',
    '電話番号':             'phone',
    'email':                'email',
    '現場郵便番号':         'zip',
    '現場名':               'site',
    '現場住所':             'address',
    '警備種別':             'guardType',
    '警備開始日':           'startDate',
    '警備終了日':           'endDate',
    '開始時刻':             'startTime',
    '終了時刻':             'endTime',
    '勤務区分':             'shift',
    '必要人数':             'staff',
    '残業見込み時間':       'ot',
    '無線機台数':           'radios',
    '確定警備料金（税抜）': 'fee',
    '残業単価（税抜）':     'otRate',
    '備考':                 'notes',
    '資機材準備':           'equip',
    'カラーコーン（個）':   'cones',
    '保安灯・点滅灯（個）': 'lights',
    '矢印板（枚）':         'signs',
    '無線機（台）':         'radiosEquip',
    'その他資機材':         'otherEquip',
    '特約事項':             'special',
    '契約締結日':           'contractDate',
    'ステータス':           'status',
    'rowIndex':             'rowIndex',
  };

  let orders = []; // 取得済みデータ

  // ── データ取得 ──
  async function loadOrders() {
    document.getElementById('msgLoading').style.display = 'block';
    document.getElementById('msgError').style.display   = 'none';
    document.getElementById('ordersBody').innerHTML = '';

    try {
      const res = await fetch(GAS_URL);
      const raw = await res.json();
      const rows = Array.isArray(raw) ? raw : (raw.orders || []);

      // 日本語キー → 内部キーに変換
      orders = rows.map((row, idx) => {
        const o = { _arrayIdx: idx };
        Object.entries(row).forEach(([k, v]) => {
          const mapped = FIELD_MAP[k];
          o[mapped !== undefined ? mapped : k] = v;
        });
        // rowIndex が返らない場合はスプレッドシートの行番号を推定（ヘッダー行=1, データ開始=2）
        if (o.rowIndex === undefined) o.rowIndex = idx + 2;
        return o;
      });

      renderTable();
    } catch (_) {
      document.getElementById('msgError').style.display = 'block';
    } finally {
      document.getElementById('msgLoading').style.display = 'none';
    }
  }

  // ── テーブル描画 ──
  function renderTable() {
    const tbody = document.getElementById('ordersBody');
    if (orders.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:#6b7280;">依頼データがありません</td></tr>';
      return;
    }
    tbody.innerHTML = orders.map((o, idx) => {
      const st = o.status || '未確認';
      const startDate = (o.startDate || '').replace(/-/g, '/');
      const endDate   = (o.endDate   || '').replace(/-/g, '/');
      const period = startDate + (endDate && endDate !== startDate ? ' ～ ' + endDate : '');
      const statusOpts = STATUS_LIST.map(s =>
        `<option value="${s}"${s === st ? ' selected' : ''}>${s}</option>`
      ).join('');
      const cls = 'st-' + st;
      return `<tr class="${cls}" data-idx="${idx}">
        <td style="white-space:nowrap">${o.receivedAt || '—'}</td>
        <td>${o.company || '—'}</td>
        <td>${o.site || '—'}</td>
        <td style="white-space:nowrap">${period || '—'}</td>
        <td style="text-align:center">${o.staff || '—'}名</td>
        <td>
          <select class="status-select-sm" onchange="changeStatus(${idx}, this.value)">
            ${statusOpts}
          </select>
        </td>
        <td>
          <div class="action-cell">
            <button class="btn-detail" onclick="openDetail(${idx})">詳細</button>
            <a href="${buildContractUrl(o)}" target="_blank" class="btn-contract-sm">契約書</a>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  // ── ステータス変更 ──
  async function changeStatus(idx, newStatus) {
    orders[idx].status = newStatus;
    const row = document.querySelector(`[data-idx="${idx}"]`);
    if (row) {
      row.className = 'st-' + newStatus;
    }
    // GASに保存（no-cors）
    try {
      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action:   'updateStatus',
          rowIndex: orders[idx].rowIndex,
          status:   newStatus
        })
      });
    } catch (_) {}
  }

  // ── 詳細モーダル ──
  function openDetail(idx) {
    const o = orders[idx];
    const fmt = n => { const v = parseInt(n); return isNaN(v) ? (n || '—') : v.toLocaleString('ja-JP'); };

    const rows = [
      ['受付日時',             o.receivedAt],
      ['会社名',               o.company],
      ['担当者名',             o.contact],
      ['電話番号',             o.phone],
      ['メール',               o.email],
      ['現場郵便番号',         o.zip],
      ['現場名',               o.site],
      ['現場住所',             o.address],
      ['警備種別',             o.guardType],
      ['警備開始日',           (o.startDate || '').replace(/-/g, '/')],
      ['警備終了日',           (o.endDate   || '').replace(/-/g, '/')],
      ['開始時刻',             o.startTime],
      ['終了時刻',             o.endTime],
      ['勤務区分',             o.shift],
      ['必要人数',             o.staff ? o.staff + '名' : '—'],
      ['残業見込み時間',       o.ot ? o.ot + '時間/人・日' : '0時間'],
      ['無線機台数',           o.radios ? o.radios + '台' : '0台'],
      ['確定警備料金（税抜）', o.fee   ? fmt(o.fee)   + '円' : '—'],
      ['残業単価（税抜）',     o.otRate ? fmt(o.otRate) + '円/h' : '—'],
      ['資機材準備',           o.equip],
      ['カラーコーン',         o.cones      ? o.cones + '個'      : '0個'],
      ['保安灯・点滅灯',       o.lights     ? o.lights + '個'     : '0個'],
      ['矢印板',               o.signs      ? o.signs + '枚'      : '0枚'],
      ['無線機（資機材）',     o.radiosEquip ? o.radiosEquip + '台' : '0台'],
      ['その他資機材',         o.otherEquip || 'なし'],
      ['備考',                 o.notes      || 'なし'],
      ['特約事項',             o.special    || 'なし'],
      ['契約締結日',           (o.contractDate || '').replace(/-/g, '/')],
      ['ステータス',           o.status     || '未確認'],
    ];

    const gridHTML = rows.map(([label, val]) =>
      `<div class="detail-label">${label}</div><div class="detail-val">${val || '—'}</div>`
    ).join('');

    document.getElementById('detailTitle').textContent = (o.company || '依頼') + '　詳細';
    document.getElementById('detailBody').innerHTML = `
      <div class="detail-grid">${gridHTML}</div>
      <div class="detail-actions">
        <a href="${buildContractUrl(o)}" target="_blank" class="btn-contract-lg">📄 契約書を作成する</a>
      </div>
    `;
    document.getElementById('detailOverlay').classList.add('open');
  }

  function closeDetail(e) {
    if (e && e.target !== document.getElementById('detailOverlay')) return;
    document.getElementById('detailOverlay').classList.remove('open');
  }

  // ── 契約書URL構築 ──
  function buildContractUrl(o) {
    const params = new URLSearchParams({
      company:     o.company      || '',
      contact:     o.contact      || '',
      phone:       o.phone        || '',
      site:        o.site         || '',
      zip:         o.zip          || '',
      address:     o.address      || '',
      guardType:   o.guardType    || '',
      startDate:   o.startDate    || '',
      endDate:     o.endDate      || '',
      startTime:   o.startTime    || '',
      endTime:     o.endTime      || '',
      shift:       o.shift        || '',
      staff:       o.staff        || '',
      ot:          o.ot           || '',
      radios:      o.radios       || '',
      fee:         o.fee          || '',
      otRate:      o.otRate       || '',
      equip:       o.equip        || '',
      cones:       o.cones        || '',
      lights:      o.lights       || '',
      signs:       o.signs        || '',
      radiosEquip: o.radiosEquip  || '',
      otherEquip:  o.otherEquip   || '',
      special:     o.special      || '',
      contractDate:o.contractDate || ''
    });
    return '/contract/?' + params.toString();
  }

  // ── 新規契約書（空） ──
  function openNewContract() {
    window.open('/contract/', '_blank');
  }

  // ── 認証 ──
  function doLogin() {
    const pw = document.getElementById('pwInput').value;
    if (pw === PASS) {
      localStorage.setItem(AUTH_KEY, '1');
      showAdmin();
    } else {
      document.getElementById('loginErr').textContent = 'パスワードが違います。';
      document.getElementById('pwInput').value = '';
    }
  }
  function doLogout() {
    localStorage.removeItem(AUTH_KEY);
    location.reload();
  }
  function showAdmin() {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    loadOrders();
  }

  if (localStorage.getItem(AUTH_KEY) === '1') showAdmin();
</script>
</body>
</html>
